<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="settings.css">
</head>
<body>
<div class="container">

  <!-- TOP BAR -->
  <div class="top">
    <img src="seticon.png" class="icon-left">

    <p class="title">Settings</p>

    <button onclick="goBack()" class="back-btn">
      <img src="back.png">
    </button>
  </div>

  <!-- OPTIONS -->
  <div class="options">

    <div class="option">
      <img src="acc.png">
      <p>Account Settings</p>
    </div>

    <div class="option">
      <img src="notif.png">
      <p>Notifications</p>
    </div>

    <div class="option">
      <img src="audio.png">
      <p>Audio</p>
    </div>

    <div class="option">
      <img src="Feedback.png">
      <p>Feedback</p>
    </div>

    <div class="option">
      <img src="FAQIcon.png">
      <p>FAQ</p>
    </div>

  </div>

</div>
</div>
</div>
</body>
</html>
